<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Plan Callisthénique</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f2f2f2; color: #1a1a1a; }

  header { background: #1a1a1a; color: #fff; padding: 20px 16px 16px; }
  header h1 { font-size: 20px; font-weight: 700; margin-bottom: 3px; }
  header p { font-size: 13px; color: #888; }

  .days-nav { display: flex; overflow-x: auto; background: #fff; border-bottom: 1px solid #e0e0e0; scrollbar-width: none; position: sticky; top: 0; z-index: 10; }
  .days-nav::-webkit-scrollbar { display: none; }
  .day-btn { flex: none; padding: 12px 16px; font-size: 13px; font-weight: 600; color: #999; background: none; border: none; border-bottom: 3px solid transparent; cursor: pointer; white-space: nowrap; }
  .day-btn.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }
  .day-btn .tag { display: block; font-size: 10px; font-weight: 500; margin-top: 1px; }
  .tag.push { color: #c94a00; }
  .tag.pull { color: #005fcc; }
  .tag.legs { color: #007a40; }
  .tag.rest { color: #aaa; }

  .day-content { display: none; padding: 14px; }
  .day-content.active { display: block; }

  .rest-card { background: #fff; border-radius: 12px; padding: 36px 20px; text-align: center; }
  .rest-card .icon { font-size: 42px; margin-bottom: 12px; }
  .rest-card h2 { font-size: 18px; font-weight: 700; margin-bottom: 8px; }
  .rest-card p { font-size: 14px; color: #666; line-height: 1.6; }

  /* Timer */
  .timer-block { background: #fff; border-radius: 12px; padding: 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
  .timer-display { font-size: 38px; font-weight: 700; letter-spacing: -1px; font-variant-numeric: tabular-nums; min-width: 90px; }
  .timer-display.counting { color: #c94a00; }
  .timer-right { flex: 1; }
  .timer-label { font-size: 11px; color: #999; margin-bottom: 8px; }
  .timer-btns { display: flex; gap: 6px; margin-bottom: 8px; }
  .tbtn { border: none; border-radius: 8px; padding: 8px 14px; font-size: 13px; font-weight: 700; cursor: pointer; }
  .tbtn.go { background: #1a1a1a; color: #fff; }
  .tbtn.sm { background: #f2f2f2; color: #333; }
  .presets { display: flex; gap: 6px; flex-wrap: wrap; }
  .pbtn { border: 1.5px solid #ddd; background: #fff; border-radius: 20px; padding: 5px 12px; font-size: 12px; font-weight: 600; cursor: pointer; color: #444; }
  .pbtn:active { background: #f2f2f2; }

  /* Session */
  .session-header { background: #fff; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; display: flex; align-items: center; gap: 12px; }
  .session-icon { width: 42px; height: 42px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
  .icon-push { background: #fff0e8; }
  .icon-pull { background: #e8f0ff; }
  .icon-legs { background: #e8fff2; }
  .session-header h2 { font-size: 16px; font-weight: 700; line-height: 1.2; }
  .session-header p { font-size: 12px; color: #777; margin-top: 2px; }

  /* Exercice */
  .exercise { background: #fff; border-radius: 12px; margin-bottom: 8px; overflow: hidden; }
  .ex-header { padding: 14px 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; -webkit-tap-highlight-color: transparent; }
  .ex-num { width: 32px; height: 32px; border-radius: 8px; font-size: 14px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .n-push { background: #fff0e8; color: #c94a00; }
  .n-pull { background: #e8f0ff; color: #005fcc; }
  .n-legs { background: #e8fff2; color: #007a40; }
  .n-core { background: #f3eeff; color: #6030a0; }
  .ex-title { flex: 1; }
  .ex-title h3 { font-size: 15px; font-weight: 700; }
  .ex-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }
  .expill { background: #f2f2f2; border-radius: 20px; padding: 3px 10px; font-size: 12px; font-weight: 600; color: #444; }
  .ex-chevron { font-size: 20px; color: #ccc; transition: transform .2s; flex-shrink: 0; }
  .exercise.open .ex-chevron { transform: rotate(90deg); }

  .ex-body { display: none; border-top: 1px solid #f0f0f0; }
  .exercise.open .ex-body { display: block; }

  .ex-stats { display: grid; grid-template-columns: repeat(3, 1fr); }
  .stat { padding: 14px 8px; text-align: center; border-right: 1px solid #f0f0f0; border-bottom: 1px solid #f0f0f0; }
  .stat:last-child { border-right: none; }
  .stat .val { font-size: 22px; font-weight: 700; line-height: 1; }
  .stat .lbl { font-size: 11px; color: #888; margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

  .tip { margin: 12px 16px 0; background: #fff8f0; border-left: 3px solid #c94a00; border-radius: 0 8px 8px 0; padding: 10px 12px; font-size: 13px; color: #7a3000; line-height: 1.5; }
  .tip.blue { background: #f0f5ff; border-color: #005fcc; color: #003380; }
  .tip.green { background: #f0fff6; border-color: #007a40; color: #004020; }

  .ex-steps { padding: 14px 16px; }
  .ex-steps h4 { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: #aaa; margin-bottom: 10px; }
  .step { display: flex; gap: 10px; margin-bottom: 9px; align-items: flex-start; }
  .step:last-child { margin-bottom: 0; }
  .snum { width: 22px; height: 22px; border-radius: 50%; background: #f2f2f2; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #666; }
  .step p { font-size: 14px; color: #333; line-height: 1.5; padding-top: 2px; }
</style>
</head>
<body>

<header>
  <h1>Plan Callisthénique</h1>
  <p>25 min · 6 jours/semaine · Elliptique le midi</p>
</header>

<nav class="days-nav">
  <button class="day-btn active" onclick="showDay('lun',this)">Lun<span class="tag push">Push</span></button>
  <button class="day-btn" onclick="showDay('mar',this)">Mar<span class="tag pull">Pull</span></button>
  <button class="day-btn" onclick="showDay('mer',this)">Mer<span class="tag legs">Jambes</span></button>
  <button class="day-btn" onclick="showDay('jeu',this)">Jeu<span class="tag push">Push</span></button>
  <button class="day-btn" onclick="showDay('ven',this)">Ven<span class="tag pull">Pull</span></button>
  <button class="day-btn" onclick="showDay('sam',this)">Sam<span class="tag legs">Jambes</span></button>
  <button class="day-btn" onclick="showDay('dim',this)">Dim<span class="tag rest">Repos</span></button>
</nav>

<!-- LUNDI -->
<div id="day-lun" class="day-content active"></div>
<!-- MARDI -->
<div id="day-mar" class="day-content"></div>
<!-- MERCREDI -->
<div id="day-mer" class="day-content"></div>
<!-- JEUDI -->
<div id="day-jeu" class="day-content"></div>
<!-- VENDREDI -->
<div id="day-ven" class="day-content"></div>
<!-- SAMEDI -->
<div id="day-sam" class="day-content"></div>

<!-- DIMANCHE -->
<div id="day-dim" class="day-content">
  <div class="rest-card">
    <div class="icon">😴</div>
    <h2>Jour de repos</h2>
    <p>Le muscle se construit pendant la récupération, pas pendant l'effort. Ce jour est obligatoire, pas optionnel.</p>
  </div>
</div>

<script>
// ── DONNÉES ──────────────────────────────────────────────────────────────
var SESSIONS = {
  push: {
    icon: '💥', iconClass: 'icon-push',
    title: 'Push — Pectoraux / Épaules / Triceps',
    exercises: [
      {
        num: '1', numClass: 'n-push', name: 'Pompes',
        muscles: 'Pectoraux · Épaules · Triceps',
        series: '3', reps: '8–12', repos: '60s',
        tip: '🟠 Débutant : pompes sur les genoux ou contre un mur.',
        tipClass: '',
        steps: [
          'Mains légèrement plus larges que les épaules, doigts vers l\'extérieur',
          'Corps aligné tête → talons, abdos serrés',
          'Descends lentement jusqu\'à frôler le sol — 2 secondes',
          'Pousse fort, expire en remontant — 1 à 2 secondes',
          'Ne verrouille pas les coudes en haut'
        ]
      },
      {
        num: '2', numClass: 'n-push', name: 'Dips sur chaise',
        muscles: 'Triceps · Épaules',
        series: '3', reps: '8–10', repos: '60s',
        tip: '🟠 Débutant : jambes pliées à 90° pour réduire le poids.',
        tipClass: '',
        steps: [
          'Mains au bord d\'une chaise solide, largeur des hanches',
          'Fesses hors de la chaise, jambes tendues',
          'Descends coudes à 90°, dos proche de la chaise',
          '⚠️ Coudes parallèles — ne les écarte pas'
        ]
      },
      {
        num: '3', numClass: 'n-core', name: 'Planche',
        muscles: 'Abdos profonds · Lombaires',
        series: '3', reps: '20–40s', repos: '45s',
        tip: '🟠 Débutant : planche sur les genoux.',
        tipClass: '',
        steps: [
          'Avant-bras au sol, coudes sous les épaules',
          'Corps en ligne droite, hanches ni trop hautes ni affaissées',
          'Abdos bien serrés, respire normalement'
        ]
      }
    ]
  },
  pull: {
    icon: '🔗', iconClass: 'icon-pull',
    title: 'Pull — Dos / Biceps / Trapèzes',
    exercises: [
      {
        num: '1', numClass: 'n-pull', name: 'Traction australienne',
        muscles: 'Dos · Rhomboïdes · Biceps',
        series: '3', reps: '6–10', repos: '75s',
        tip: '📍 Sous une table solide. Corps tendu, serre les omoplates avant de tirer. Vérifie qu\'elle supporte ton poids.',
        tipClass: 'blue',
        steps: [
          'Allonge-toi sous la table, attrape le bord à pleine main',
          'Corps tendu comme une planche, talons au sol',
          'Serre les omoplates, tire la poitrine vers la table',
          'Descends lentement — 2 à 3 secondes',
          'Progression : pieds surélevés sur une chaise'
        ]
      },
      {
        num: '2', numClass: 'n-pull', name: 'Superman',
        muscles: 'Lombaires · Fessiers · Trapèzes',
        series: '3', reps: '12–15', repos: '45s',
        tip: 'L\'exercice anti-posture développeur par excellence.',
        tipClass: 'blue',
        steps: [
          'Face au sol, bras tendus devant, jambes droites',
          'Lève simultanément bras, poitrine ET jambes',
          'Tiens 2 sec en contractant fessiers et dos',
          'Redescends lentement',
          'Variante facile : alterner bras droit + jambe gauche'
        ]
      },
      {
        num: '3', numClass: 'n-pull', name: 'Rowing sac lesté',
        muscles: 'Grand dorsal · Biceps',
        series: '3', reps: '10–12', repos: '60s',
        tip: '🎒 Sac à dos rempli de 5–10 kg de bouteilles d\'eau.',
        tipClass: 'blue',
        steps: [
          'Penché à ~45°, dos plat, genoux légèrement fléchis',
          'Tiens le sac dans une main, bras tendu',
          'Tire le coude vers le plafond en serrant l\'omoplate',
          'Redescends lentement, sans balancer le corps',
          'Toutes les reps d\'un côté, puis change'
        ]
      }
    ]
  },
  legs: {
    icon: '🦵', iconClass: 'icon-legs',
    title: 'Jambes — Quadriceps / Fessiers / Core',
    exercises: [
      {
        num: '1', numClass: 'n-legs', name: 'Squat',
        muscles: 'Quadriceps · Fessiers · Ischios',
        series: '3', reps: '15–20', repos: '60s',
        tip: 'À 97 kg tu es déjà lesté — chaque squat est efficace. Priorité à la forme avant la vitesse.',
        tipClass: 'green',
        steps: [
          'Pieds à largeur d\'épaules, pointes vers l\'extérieur',
          'Bras tendus devant, regard droit',
          'Descends comme pour t\'asseoir, genoux dans l\'axe',
          'Cuisses parallèles au sol minimum',
          'Pousse dans les talons pour remonter'
        ]
      },
      {
        num: '2', numClass: 'n-legs', name: 'Fentes alternées',
        muscles: 'Quadriceps · Fessiers · Équilibre',
        series: '3', reps: '10/jambe', repos: '60s',
        tip: null,
        tipClass: '',
        steps: [
          'Grand pas en avant',
          'Genou arrière vers le sol sans le poser brutalement',
          'Genou avant au-dessus de la cheville, pas en avant',
          'Reviens et alterne l\'autre jambe'
        ]
      },
      {
        num: '3', numClass: 'n-core', name: 'Mountain Climbers',
        muscles: 'Abdos · Fléchisseurs · Cardio',
        series: '3', reps: '20–30s', repos: '45s',
        tip: '🟠 Débutant : commence lentement, 1 rep toutes les 2 secondes.',
        tipClass: 'green',
        steps: [
          'Position de pompe, bras tendus, corps aligné',
          'Ramène un genou vers la poitrine, alterne rapidement',
          'Hanches basses — ne les lève pas'
        ]
      }
    ]
  }
};

var DAY_TYPES = {
  lun: 'push', mar: 'pull', mer: 'legs',
  jeu: 'push', ven: 'pull', sam: 'legs'
};

// ── RENDU ─────────────────────────────────────────────────────────────────
function buildTimer(day) {
  return '<div class="timer-block">' +
    '<div class="timer-display" id="td-' + day + '">00:00</div>' +
    '<div class="timer-right">' +
      '<div class="timer-label" id="tl-' + day + '">Chrono libre</div>' +
      '<div class="timer-btns">' +
        '<button class="tbtn go" onclick="tStart(\'' + day + '\')">▶ Start</button>' +
        '<button class="tbtn sm" onclick="tPause(\'' + day + '\')">⏸</button>' +
        '<button class="tbtn sm" onclick="tReset(\'' + day + '\')">↺</button>' +
      '</div>' +
      '<div class="presets">' +
        '<button class="pbtn" onclick="tCD(\'' + day + '\',75)">75s</button>' +
        '<button class="pbtn" onclick="tCD(\'' + day + '\',60)">60s</button>' +
        '<button class="pbtn" onclick="tCD(\'' + day + '\',45)">45s</button>' +
        '<button class="pbtn" onclick="tCD(\'' + day + '\',30)">30s</button>' +
      '</div>' +
    '</div>' +
  '</div>';
}

function buildExercise(ex, day, idx) {
  var id = day + '-ex' + idx;
  var repsLabel = ex.reps.indexOf('s') !== -1 ? 'Durée' : 'Reps';
  var steps = ex.steps.map(function(s, i) {
    return '<div class="step"><div class="snum">' + (i+1) + '</div><p>' + s + '</p></div>';
  }).join('');
  var tip = ex.tip ? '<div class="tip ' + ex.tipClass + '">' + ex.tip + '</div>' : '';
  return '<div class="exercise" id="' + id + '">' +
    '<div class="ex-header" onclick="toggle(\'' + id + '\')">' +
      '<div class="ex-num ' + ex.numClass + '">' + ex.num + '</div>' +
      '<div class="ex-title">' +
        '<h3>' + ex.name + '</h3>' +
        '<p>' + ex.muscles + '</p>' +
        '<div class="ex-pills">' +
          '<span class="expill">' + ex.series + ' séries</span>' +
          '<span class="expill">' + ex.reps + ' reps</span>' +
          '<span class="expill">' + ex.repos + ' repos</span>' +
        '</div>' +
      '</div>' +
      '<span class="ex-chevron">›</span>' +
    '</div>' +
    '<div class="ex-body">' +
      '<div class="ex-stats">' +
        '<div class="stat"><div class="val">' + ex.series + '</div><div class="lbl">Séries</div></div>' +
        '<div class="stat"><div class="val">' + ex.reps + '</div><div class="lbl">' + repsLabel + '</div></div>' +
        '<div class="stat"><div class="val">' + ex.repos + '</div><div class="lbl">Repos</div></div>' +
      '</div>' +
      tip +
      '<div class="ex-steps"><h4>Technique</h4>' + steps + '</div>' +
    '</div>' +
  '</div>';
}

function buildDay(day) {
  var type = DAY_TYPES[day];
  var s = SESSIONS[type];
  var suffix = (day === 'jeu' || day === 'ven' || day === 'sam') ? ' — même séance' : '';
  var html = buildTimer(day);
  html += '<div class="session-header">' +
    '<div class="session-icon ' + s.iconClass + '">' + s.icon + '</div>' +
    '<div><h2>' + s.title + suffix + '</h2><p>3 exercices · ~25 minutes</p></div>' +
  '</div>';
  s.exercises.forEach(function(ex, i) {
    html += buildExercise(ex, day, i + 1);
  });
  return html;
}

// Injecter dans chaque onglet
Object.keys(DAY_TYPES).forEach(function(day) {
  document.getElementById('day-' + day).innerHTML = buildDay(day);
});

// ── NAVIGATION ────────────────────────────────────────────────────────────
function showDay(id, btn) {
  document.querySelectorAll('.day-content').forEach(function(d) { d.classList.remove('active'); });
  document.querySelectorAll('.day-btn').forEach(function(b) { b.classList.remove('active'); });
  document.getElementById('day-' + id).classList.add('active');
  btn.classList.add('active');
}

function toggle(id) {
  document.getElementById(id).classList.toggle('open');
}

// ── TIMERS ────────────────────────────────────────────────────────────────
var timers = {};

function getT(day) {
  if (!timers[day]) timers[day] = { interval: null, seconds: 0, countdown: false, from: 0, running: false };
  return timers[day];
}

function p2(n) { return String(n).padStart(2, '0'); }

function render(day) {
  var t = getT(day);
  var s = t.countdown ? Math.max(0, t.from - t.seconds) : t.seconds;
  var el = document.getElementById('td-' + day);
  if (el) {
    el.textContent = p2(Math.floor(s / 60)) + ':' + p2(s % 60);
    el.className = 'timer-display' + (t.running ? ' counting' : '');
  }
  if (t.countdown && s === 0 && t.running) tPause(day);
}

function tStart(day) {
  var t = getT(day);
  if (t.running) return;
  t.running = true;
  t.interval = setInterval(function() { t.seconds++; render(day); }, 1000);
}

function tPause(day) {
  var t = getT(day);
  t.running = false;
  clearInterval(t.interval);
  render(day);
}

function tReset(day) {
  var t = getT(day);
  t.running = false;
  clearInterval(t.interval);
  t.seconds = 0;
  t.countdown = false;
  var lbl = document.getElementById('tl-' + day);
  if (lbl) lbl.textContent = 'Chrono libre';
  render(day);
}

function tCD(day, secs) {
  tReset(day);
  var t = getT(day);
  t.countdown = true;
  t.from = secs;
  var lbl = document.getElementById('tl-' + day);
  if (lbl) lbl.textContent = 'Repos ' + secs + 's';
  render(day);
  tStart(day);
}
</script>
</body>
</html>
